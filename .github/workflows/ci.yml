name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e '.[build]'

      - name: Run unit tests
        run: python -m unittest tests.test_core

      - name: Compile key entry files
        run: |
          python -m py_compile \
            main.py \
            src/deepseek_balance_monitor_mac/mac/main.py \
            src/deepseek_balance_monitor_mac/mac/settings.py
