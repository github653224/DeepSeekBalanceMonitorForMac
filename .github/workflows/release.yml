name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-release:
    name: Build release assets
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e '.[build]'

      - name: Run unit tests
        run: python -m unittest tests.test_core

      - name: Compile key entry files
        run: |
          python -m py_compile \
            main.py \
            src/deepseek_balance_monitor_mac/mac/main.py \
            src/deepseek_balance_monitor_mac/mac/settings.py

      - name: Build macOS app bundle
        run: bash scripts/build_mac.sh

      - name: Build DMG
        run: bash scripts/build_dmg.sh

      - name: Build Python distributions
        run: python -m build

      - name: Check Python distributions
        run: twine check dist/*.whl dist/*.tar.gz

      - name: Generate checksums
        run: |
          shasum -a 256 \
            dist/DeepSeek-Balance-Monitor-mac.zip \
            dist/DeepSeek-Balance-Monitor-mac.dmg \
            dist/deepseek_balance_monitor_mac-*.whl \
            dist/deepseek_balance_monitor_mac-*.tar.gz \
            > dist/SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/DeepSeek-Balance-Monitor-mac.zip
            dist/DeepSeek-Balance-Monitor-mac.dmg
            dist/deepseek_balance_monitor_mac-*.whl
            dist/deepseek_balance_monitor_mac-*.tar.gz
            dist/SHA256SUMS.txt

  publish-github-release:
    name: Publish GitHub release
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: dist

      - name: Create GitHub release and upload assets
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/DeepSeek-Balance-Monitor-mac.zip \
            dist/DeepSeek-Balance-Monitor-mac.dmg \
            dist/deepseek_balance_monitor_mac-*.whl \
            dist/deepseek_balance_monitor_mac-*.tar.gz \
            dist/SHA256SUMS.txt \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && vars.PYPI_PUBLISH_ENABLED == 'true'
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: dist

      - name: Prepare PyPI distributions only
        run: |
          mkdir -p pypi-dist
          cp dist/*.whl pypi-dist/
          cp dist/*.tar.gz pypi-dist/

      - name: Publish Python distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist
